<script>

const API_KEY   = "AIzaSyCmGXtYzvOot3nI3QL9f1GyT-4MTPI6oKM";

/* =========================================================
   CHROMA KEY SHADER
========================================================= */
AFRAME.registerShader('chromakey', {
  schema: {
    src:        {type:'map'},
    color:      {type:'color', default:'#00FF00'},
    threshold:  {type:'number', default:0.3},
    smoothness: {type:'number', default:0.05}
  },
  init(data) {
    const t = new THREE.VideoTexture(data.src);
    t.minFilter = t.magFilter = THREE.LinearFilter;
    t.generateMipmaps = false;
    this.material = new THREE.ShaderMaterial({
      uniforms:{
        tex:{value:t}, keyColor:{value:new THREE.Color(data.color)},
        similarity:{value:data.threshold}, smoothness:{value:data.smoothness}
      },
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform sampler2D tex;uniform vec3 keyColor;uniform float similarity,smoothness;varying vec2 vUv;
        void main(){vec4 c=texture2D(tex,vUv);float d=distance(c.rgb,keyColor);
        float a=smoothstep(similarity,similarity+smoothness,d);if(a<.1)discard;gl_FragColor=vec4(c.rgb,a);}`,
      transparent:true
    });
  }
});

/* =========================================================
   DRIVE FETCH
========================================================= */
async function getLatestVideo() {
  const url=`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'video/'&orderBy=modifiedTime+desc&pageSize=1&fields=files(id)&key=${API_KEY}`;
  try { const r=await fetch(url),d=await r.json(); return d.files?.[0]?.id||null; }
  catch(e) { console.error(e); return null; }

/* =========================================================
   BASE EFFECT CLASS
   anchor3D = fxAnchor.object3D  → moves with the marker
========================================================= */
class AREffect {
  constructor(anchor3D) {
    this.anchor  = anchor3D;
    this.meshes  = [];
    this.rafId   = null;
    this.ivals   = [];
    this.alive   = false;
  }
  add(obj) { this.anchor.add(obj); this.meshes.push(obj); }
  stop() {
    this.alive = false;
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this.ivals.forEach(i => clearInterval(i));
    this.ivals = [];
    [...this.meshes].forEach(o => {
      this.anchor.remove(o);
      o.geometry && o.geometry.dispose();
      if (o.material) {
        Array.isArray(o.material) ? o.material.forEach(m=>m.dispose()) : o.material.dispose();
      }
    });
    this.meshes = [];
  }
  loop(fn) {
    const tick = () => { if (!this.alive) return; fn(); this.rafId = requestAnimationFrame(tick); };
    this.rafId = requestAnimationFrame(tick);
  }
}

/* =========================================================
   EFFECT 1 — LIGHTNING STRIKES
   Jagged electric bolts arc from the 4 marker corners
   to the center, branching and crackling in real time.
========================================================= */
class LightningStrikeEffect extends AREffect {
  start() {
    this.alive   = true;
    this.t       = 0;
    this.bolts   = [];
    this.nodes   = [];
    this.CORNERS = [
      new THREE.Vector3(-0.52,0,-0.52), new THREE.Vector3(0.52,0,-0.52),
      new THREE.Vector3(-0.52,0, 0.52), new THREE.Vector3(0.52,0, 0.52)
    ];
    this.CORNERS.forEach(pos => {
      const geo  = new THREE.SphereGeometry(0.026,8,8);
      const mat  = new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9});
      const node = new THREE.Mesh(geo,mat);
      node.position.copy(pos); node.userData.phase=Math.random()*Math.PI*2;
      this.add(node); this.nodes.push(node);
    });
    this._strikeAll();
    this.ivals.push(setInterval(()=>{if(this.alive)this._strikeAll();},280));
    this.loop(()=>{
      this.t+=0.05;
      this.nodes.forEach(n=>{
        const f=0.35+0.65*Math.abs(Math.sin(this.t*9+n.userData.phase));
        n.material.opacity=f; n.scale.setScalar(0.6+0.8*f);
        n.material.color.setHSL((185+Math.random()*35)/360,1,0.9);
      });
      for(let i=this.bolts.length-1;i>=0;i--){
        const b=this.bolts[i]; b.age+=0.05;
        b.segs.forEach(s=>{
          if(Math.random()<0.3)s.visible=!s.visible;else s.visible=true;
          s.material.opacity=Math.max(0,(1-b.age/b.life)*(0.5+Math.random()*0.5));
          s.position.x+=(Math.random()-0.5)*0.005; s.position.z+=(Math.random()-0.5)*0.005;
        });
        if(b.age>=b.life){
          b.segs.forEach(s=>{this.anchor.remove(s);s.geometry.dispose();s.material.dispose();this.meshes.splice(this.meshes.indexOf(s),1);});
          this.bolts.splice(i,1);
        }
      }
    });
  }
  _strikeAll(){
    this.CORNERS.forEach(c=>{
      this._bolt(c,new THREE.Vector3(0,0,0),0xffffff,4);
      if(Math.random()<0.65){const m=c.clone().lerp(new THREE.Vector3(0,0,0),0.35+Math.random()*0.35);m.x+=(Math.random()-0.5)*0.5;m.z+=(Math.random()-0.5)*0.5;this._bolt(c,m,0x88eeff,3);}
    });
    if(Math.random()<0.45){const a=this.CORNERS[Math.floor(Math.random()*4)],b=this.CORNERS[Math.floor(Math.random()*4)];if(a!==b)this._bolt(a,b,0xcc88ff,2);}
  }
  _bolt(start,end,col,w){
    const N=10+Math.floor(Math.random()*8),bolt={age:0,life:0.16+Math.random()*0.2,segs:[]};
    const pts=[start.clone()];
    for(let i=1;i<N;i++){const p=start.clone().lerp(end,i/N);p.x+=(Math.random()-0.5)*0.12;p.y+=(Math.random()-0.5)*0.04;p.z+=(Math.random()-0.5)*0.12;pts.push(p);}
    pts.push(end.clone());
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1],len=a.distanceTo(b);
      const geo=new THREE.BoxGeometry(0.004*w,0.004*w,len);
      const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9});
      const seg=new THREE.Mesh(geo,mat);
      seg.position.copy(a).lerp(b,0.5);
      seg.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),b.clone().sub(a).normalize());
      this.add(seg);bolt.segs.push(seg);
    }
    this.bolts.push(bolt);
  }
  stop(){this.bolts=[];this.nodes=[];super.stop();}
}

/* =========================================================
   EFFECT 2 — MAGIC SPARKLE TRAIL
   Star-shaped sparkles orbit the marker in figure-8
   paths, leaving glowing comet tails. Each sparkle
   pulses with rainbow color shifts and twinkles
   at its own unique rhythm.
========================================================= */
class MagicSparkleEffect extends AREffect {
  start() {
    this.alive    = true;
    this.t        = 0;
    this.sparkles = [];
    this.trails   = []; // trail dot pools

    const N = 22;
    for (let i=0; i<N; i++) {
      const hue  = (i/N)*360;
      const geo  = new THREE.SphereGeometry(0.018+Math.random()*0.018, 6, 6);
      const mat  = new THREE.MeshBasicMaterial({
        color: new THREE.Color(`hsl(${hue},100%,80%)`), transparent:true, opacity:1
      });
      const sp = new THREE.Mesh(geo, mat);
      sp.userData = {
        hue    : hue,
        phase  : (i/N)*Math.PI*2,
        rx     : 0.35+Math.random()*0.35,  // x radius
        rz     : 0.20+Math.random()*0.30,  // z radius
        speed  : 0.7+Math.random()*0.9,
        twinkP : Math.random()*Math.PI*2,
        twinkF : 3+Math.random()*6,
        prevPos: new THREE.Vector3(),
        trailBuf: []
      };
      this.add(sp);
      this.sparkles.push(sp);

      // Pre-build 6 trail dots per sparkle
      for (let j=0; j<6; j++) {
        const tg  = new THREE.SphereGeometry(0.008, 4, 4);
        const tm  = new THREE.MeshBasicMaterial({
          color: new THREE.Color(`hsl(${hue},100%,85%)`), transparent:true, opacity:0
        });
        const td = new THREE.Mesh(tg, tm);
        this.add(td);
        sp.userData.trailBuf.push({ mesh:td, pos:new THREE.Vector3(), age:0 });
      }
    }

    this.loop(() => {
      this.t += 0.022;
      this.sparkles.forEach(sp => {
        const u = sp.userData;

        // Record previous position for trail
        u.prevPos.copy(sp.position);

        // Figure-8 Lissajous path on the marker plane
        const angle = this.t * u.speed + u.phase;
        sp.position.set(
          Math.sin(angle)       * u.rx,
          Math.sin(angle*2+0.5) * 0.08,
          Math.sin(angle*2)     * u.rz
        );

        // Rainbow color shift
        u.hue = (u.hue + 0.8) % 360;
        sp.material.color.setHSL(u.hue/360, 1, 0.78);

        // Twinkle opacity
        const tw = 0.5 + 0.5*Math.sin(this.t*u.twinkF + u.twinkP);
        sp.material.opacity = 0.55 + 0.45*tw;
        sp.scale.setScalar(0.7 + 0.5*tw);

        // Update trail — shift positions back
        const tb = u.trailBuf;
        for (let j=tb.length-1; j>0; j--) {
          tb[j].pos.copy(tb[j-1].pos);
          tb[j].mesh.position.copy(tb[j].pos);
          tb[j].mesh.material.opacity = (1-(j/tb.length))*0.55*tw;
          tb[j].mesh.scale.setScalar(1-(j/tb.length)*0.65);
          tb[j].mesh.material.color.setHSL(u.hue/360,1,0.85);
        }
        tb[0].pos.copy(u.prevPos);
        tb[0].mesh.position.copy(u.prevPos);
        tb[0].mesh.material.opacity = 0.7*tw;
      });
    });
  }
  stop() { this.sparkles=[]; super.stop(); }
}

/* =========================================================
   EFFECT 3 — VORTEX SPIN
   Ring of orbs spiraling around the marker
========================================================= */
class VortexEffect extends AREffect {
  start() {
    this.alive = true;
    this.t     = 0;
    this.orbs  = [];
    const N    = 48;
    for (let i=0; i<N; i++) {
      const hue = 255 + (i/N)*90;
      const sz  = 0.014+Math.random()*0.022;
      const geo = new THREE.SphereGeometry(sz,6,6);
      const mat = new THREE.MeshBasicMaterial({
        color:new THREE.Color(`hsl(${hue},100%,72%)`), transparent:true, opacity:0.85
      });
      const o = new THREE.Mesh(geo, mat);
      o.userData = {
        baseAngle : (i/N)*Math.PI*2,
        radius    : 0.28 + (i/N)*0.48,
        speed     : 1.0 + Math.random()*1.0,
        yPhase    : Math.random()*Math.PI*2,
        yAmp      : 0.04+Math.random()*0.1
      };
      this.add(o); this.orbs.push(o);
    }
    this.loop(() => {
      this.t += 0.022;
      this.orbs.forEach(o => {
        const u = o.userData;
        const a = u.baseAngle + this.t*u.speed;
        o.position.set(Math.cos(a)*u.radius, Math.sin(this.t*1.6+u.yPhase)*u.yAmp, Math.sin(a)*u.radius);
        o.material.opacity = 0.45 + 0.55*Math.abs(Math.sin(this.t*0.8+u.yPhase));
      });
    });
  }
}

/* =========================================================
   EFFECT 4 — FIREWORKS ROCKET BURST
   Rockets launch upward from the marker edges, then
   explode into cascading star-shaped sparks with
   gravity, color trails, and glittering shimmer.
   Multiple rockets fire in staggered sequence.
========================================================= */
class FireworksEffect extends AREffect {
  start() {
    this.alive   = true;
    this.t       = 0;
    this.rockets = [];  // ascending rockets
    this.stars   = [];  // exploded star sparks

    // Launch first salvo immediately, then stagger
    this._launchSalvo();
    this.ivals.push(setInterval(() => {
      if (this.alive) this._launchSalvo();
    }, 900));

    this.loop(() => {
      this.t += 0.016;

      // Update rockets — fly upward, explode at peak
      for (let i = this.rockets.length - 1; i >= 0; i--) {
        const r = this.rockets[i];
        const u = r.userData;
        u.age  += 0.016;

        // Rising motion with slight wobble
        r.position.y  += u.vy;
        r.position.x  += u.vx;
        r.position.z  += u.vz;
        u.vy          -= 0.003; // decelerate

        // Rocket trail: shrink as it rises
        const lt = u.age / u.life;
        r.material.opacity = Math.max(0, 1 - lt * 0.4);
        r.scale.setScalar(1 - lt * 0.3);

        // Explode when velocity near zero or life expired
        if (u.vy <= 0.002 || u.age >= u.life) {
          this._explode(r.position.clone(), u.hue);
          this.anchor.remove(r);
          r.geometry.dispose(); r.material.dispose();
          this.meshes.splice(this.meshes.indexOf(r), 1);
          this.rockets.splice(i, 1);
        }
      }

      // Update star sparks after explosion
      for (let i = this.stars.length - 1; i >= 0; i--) {
        const s = this.stars[i];
        const u = s.userData;
        u.age  += 0.016;
        const lt = u.age / u.life;

        s.position.addScaledVector(u.vel, 0.022);
        u.vel.y -= 0.004;  // gravity
        u.vel.multiplyScalar(0.97); // drag

        // Color: bright → dim, hue shifts toward orange as it fades
        const hue = u.hue + lt * 30;
        const lum = THREE.MathUtils.lerp(0.88, 0.3, lt);
        s.material.color.setHSL(hue / 360, 1, lum);
        s.material.opacity = Math.max(0, (1 - lt) * 0.95);
        s.scale.setScalar(Math.max(0, 1 - lt * 0.6));

        // Twinkle near end of life
        if (lt > 0.6 && Math.random() < 0.15) s.visible = !s.visible;
        else s.visible = true;

        if (u.age >= u.life) {
          this.anchor.remove(s);
          s.geometry.dispose(); s.material.dispose();
          this.meshes.splice(this.meshes.indexOf(s), 1);
          this.stars.splice(i, 1);
        }
      }
    });
  }

  _launchSalvo() {
    // Fire 2–4 rockets in quick succession
    const count = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const delay = i * 180;
      const t = setTimeout(() => {
        if (this.alive) this._launchRocket();
      }, delay);
      this.ivals.push(t);
    }
  }

  _launchRocket() {
    const hue  = Math.random() * 360;
    const geo  = new THREE.SphereGeometry(0.022, 6, 6);
    const mat  = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(hue / 360, 1, 0.9),
      transparent: true, opacity: 1
    });
    const r = new THREE.Mesh(geo, mat);

    // Launch from random point along the marker edges
    const edge = Math.floor(Math.random() * 4);
    const span = 0.45;
    const pos  = (Math.random() - 0.5) * span * 2;
    if      (edge === 0) r.position.set(pos,   0, -span);
    else if (edge === 1) r.position.set(pos,   0,  span);
    else if (edge === 2) r.position.set(-span, 0,  pos);
    else                 r.position.set( span, 0,  pos);

    r.userData = {
      age:  0,
      life: 0.55 + Math.random() * 0.35,
      vy:   0.022 + Math.random() * 0.016, // upward speed
      vx:   (Math.random() - 0.5) * 0.006,
      vz:   (Math.random() - 0.5) * 0.006,
      hue
    };

    this.add(r);
    this.rockets.push(r);
  }

  _explode(pos, hue) {
    // Burst of 28–40 star sparks in all directions
    const count = 28 + Math.floor(Math.random() * 14);
    for (let i = 0; i < count; i++) {
      const sz    = 0.010 + Math.random() * 0.018;
      const geo   = new THREE.SphereGeometry(sz, 5, 5);
      const sHue  = (hue + (Math.random() - 0.5) * 40 + 360) % 360;
      const mat   = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(sHue / 360, 1, 0.88),
        transparent: true, opacity: 1
      });
      const s = new THREE.Mesh(geo, mat);
      s.position.copy(pos);

      // Random outward velocity — hemisphere above marker
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.random() * Math.PI * 0.75;
      const spd   = 0.5 + Math.random() * 1.1;
      s.userData = {
        age:  0,
        life: 0.9 + Math.random() * 0.8,
        hue:  sHue,
        vel:  new THREE.Vector3(
          Math.sin(phi) * Math.cos(theta) * spd,
          Math.abs(Math.cos(phi)) * spd * 0.8 + 0.1,
          Math.sin(phi) * Math.sin(theta) * spd
        )
      };

      this.add(s);
      this.stars.push(s);
    }

    // Central flash sphere — big brief pop
    const flashGeo = new THREE.SphereGeometry(0.07, 8, 8);
    const flashMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(hue / 360, 0.6, 0.98),
      transparent: true, opacity: 0.85
    });
    const flash = new THREE.Mesh(flashGeo, flashMat);
    flash.position.copy(pos);
    flash.userData = {
      age: 0, life: 0.18, hue,
      vel: new THREE.Vector3(0, 0, 0)
    };
    this.add(flash);
    this.stars.push(flash);
  }

  stop() { this.rockets = []; this.stars = []; super.stop(); }
}

/* =========================================================
   EFFECT 5 — FIRE EDGE (ENHANCED)
   Dense embers rising from all 4 edges of the marker
   with heat shimmer, color shift, and swaying motion
========================================================= */
class FireEffect extends AREffect {
  start() {
    this.alive  = true;
    this.t      = 0;
    this.embers = [];

    this.loop(() => {
      this.t += 0.016;

      // Spawn 6 embers per frame tick
      for (let i=0; i<6; i++) this._spawnEmber();

      for (let i=this.embers.length-1; i>=0; i--) {
        const e = this.embers[i];
        const u = e.userData;
        u.age  += 0.016;
        const lt = u.age/u.life;

        // Rise with sway
        e.position.y += u.riseSpd;
        e.position.x += Math.sin(this.t*u.swayF + u.swayP)*0.0025;
        e.position.z += Math.cos(this.t*u.swayF*0.6 + u.swayP)*0.0015;

        // Scale: swell then shrink
        const sc = lt<0.25 ? lt/0.25 : 1-(lt-0.25)/0.75;
        e.scale.setScalar(Math.max(0, sc)*u.maxSc);

        // Color: bright white-yellow → orange → deep red
        const hue = THREE.MathUtils.lerp(50, 8, lt);
        const sat = 1.0;
        const lum = THREE.MathUtils.lerp(0.92, 0.35, lt);
        e.material.color.setHSL(hue/360, sat, lum);
        e.material.opacity = Math.max(0,(1-lt)*0.92);

        if (u.age >= u.life) {
          this.anchor.remove(e);
          e.geometry.dispose(); e.material.dispose();
          this.embers.splice(i,1);
          this.meshes.splice(this.meshes.indexOf(e),1);
        }
      }
    });
  }

  _spawnEmber() {
    // Vary size: mix tiny sparks and big flame puffs
    const big  = Math.random() < 0.3;
    const sz   = big ? 0.022+Math.random()*0.03 : 0.008+Math.random()*0.015;
    const geo  = new THREE.SphereGeometry(sz, 5, 5);
    const mat  = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(50/360,1,0.92),
      transparent:true, opacity:0.92
    });
    const e = new THREE.Mesh(geo, mat);

    // Spawn from all 4 edges + corners for denser effect
    const EDGE = 0.53;
    const side = Math.floor(Math.random()*4);
    const rand = (Math.random()-.5)*EDGE*2.1;
    if      (side===0) e.position.set(rand, 0, -EDGE);
    else if (side===1) e.position.set(rand, 0,  EDGE);
    else if (side===2) e.position.set(-EDGE, 0, rand);
    else               e.position.set( EDGE, 0, rand);

    // Add slight random offset so it doesn't look grid-like
    e.position.x += (Math.random()-.5)*0.05;
    e.position.z += (Math.random()-.5)*0.05;

    e.userData = {
      age:    0,
      life:   big ? 1.0+Math.random()*0.8 : 0.5+Math.random()*0.7,
      riseSpd:big ? 0.006+Math.random()*0.009 : 0.003+Math.random()*0.007,
      swayF:  2+Math.random()*5,
      swayP:  Math.random()*Math.PI*2,
      maxSc:  big ? 1.2+Math.random()*1.0 : 0.6+Math.random()*0.8
    };

    this.add(e);
    this.embers.push(e);
  }

  stop() { this.embers=[]; super.stop(); }
}


/* =========================================================
   EFFECT REGISTRY & DISPATCHER
========================================================= */
const EFFECTS = [
  { name:'⚡ Lightning Strikes', Cls: LightningStrikeEffect },
  { name:'🪄 Magic Sparkle Trail', Cls: MagicSparkleEffect  },
  { name:'🌀 Vortex Spin',        Cls: VortexEffect         },
  { name:'🎆 Fireworks Burst',    Cls: FireworksEffect      },
  { name:'🔥 Fire Edge',          Cls: FireEffect           }
];

let effectIdx    = 0;
let activeEffect = null;

function showBadge(name) {
  const b = document.getElementById('effectBadge');
  b.textContent = name;
  b.style.display = 'block';
  b.style.animation = 'none';
  void b.offsetWidth;
  b.style.animation = 'badgeFade 0.4s ease forwards';
}

function launchEffect(anchor3D) {
  if (activeEffect) { activeEffect.stop(); activeEffect = null; }
  const def    = EFFECTS[effectIdx];
  activeEffect = new def.Cls(anchor3D);
  activeEffect.start();
  showBadge(def.name);
  effectIdx = (effectIdx+1) % EFFECTS.length;
}

function killEffect() {
  if (activeEffect) { activeEffect.stop(); activeEffect = null; }
  document.getElementById('effectBadge').style.display = 'none';
}

/* =========================================================
   MAIN AR LOGIC
========================================================= */
window.addEventListener('load', () => {
  const videoEl          = document.querySelector('#driveVideo');
  const videoPlane       = document.querySelector('#videoPlane');
  const target           = document.querySelector('#target1');
  const fxAnchorEl       = document.querySelector('#fxAnchor');
  const toggleButton     = document.querySelector('#toggleButton');
  const buttonsContainer = document.querySelector('#planButtons');
  const curtain          = document.querySelector('#blackCurtain');
  const sceneEl          = document.querySelector('a-scene');

  let isPlaying = false;

  sceneEl.addEventListener('arReady', () => {
    curtain.style.opacity = '0';
    setTimeout(() => curtain.style.display='none', 500);
  });

  videoEl.addEventListener('playing', () => videoPlane.setAttribute('visible','true'));

  target.addEventListener('targetFound', async () => {
    buttonsContainer.style.display = 'block';

    // Give A-Frame one frame to init the object3D
    await new Promise(r => setTimeout(r, 40));
    launchEffect(fxAnchorEl.object3D);

    const fileId = await getLatestVideo();
    if (fileId) {
      const src = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
      if (videoEl.src !== src) { videoEl.src=src; videoEl.load(); }
    }
  });

  target.addEventListener('targetLost', () => {
    buttonsContainer.style.display = 'none';
    videoEl.pause();
    videoPlane.setAttribute('visible','false');
    isPlaying = false;
    toggleButton.textContent = '▶️ Play Video';
    killEffect();
  });

  toggleButton.addEventListener('click', async () => {
    if (!isPlaying) {
      videoEl.muted = false;
      await videoEl.play();
      toggleButton.textContent = '⏸ Pause Video';
      isPlaying = true;
    } else {
      videoEl.pause();
      toggleButton.textContent = '▶️ Play Video';
      isPlaying = false;
    }
  });
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
